<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英語学習アプリ</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>英語学習アプリ</h1>

    <div id="setup-area" class="container">
        <p>1. 「問題csv」を選択してください:</p>
        <input type="file" id="csv-file" accept=".csv">

        <p style="margin-top: 15px;">2. 難易度レベルを選択してください:</p>
        <select id="level-select">
            <option value="all">すべてのレベル（CSVから取得）</option>
        </select>

        <p style="margin-top: 15px;">3. 出題形式を選択してください:</p>
        <select id="format-select">
            <option value="all">すべての形式（CSVから取得）</option>
        </select>

        <p style="margin-top: 15px;">4. 出題数を入力してください（空欄ですべて出題）:</p>
        <input type="number" id="count-input" value="10" min="1" placeholder="例: 10" style="max-width: 150px;">

        <p style="margin-top: 15px;">5. 絞り込みタグを選択してください:</p>
        <select id="tag-select" style="max-width: 300px; width: 100%; padding: 10px; border-radius: 5px; border: 1px solid #444; background: #222; color: #fff; font-size: 16px;">
            <option value="">すべてのタグ（CSV選択後に更新されます）</option>
        </select>

        <div style="margin-top: 20px;">
            <button id="start-btn" onclick="startQuiz()">出題開始</button>
        </div>
        <div id="setup-error" class="error-msg" style="display: none;"></div>

        <div id="review-area" style="margin-top: 30px; display: none; padding-top: 20px; border-top: 2px dashed #555;">
            <p style="color: #ffeb3b; font-weight: bold; margin-bottom: 10px;">復習モード（前回間違えた問題）</p>
            <button id="review-btn" onclick="startReviewMode()" class="secondary-btn"
                style="background-color: #ff0055; color: #fff; box-shadow: 4px 4px 0px #ffeb3b;">間違えた問題に再挑戦する</button>
            <div style="margin-top: 15px; text-align: center;">
                <button id="reset-mistakes-btn" onclick="resetMistakes()" class="secondary-btn"
                    style="font-size: 14px; padding: 8px 15px; background-color: #222; color: #aaa; border: 1px solid #555; box-shadow: none;">間違えた記録をリセット</button>
            </div>
        </div>
    </div>

    <div id="app-area" class="container" style="display: none;">
        <div id="progress" style="margin-bottom: 10px; color: #666;"></div>
        <span id="format-badge" class="badge format-badge"></span>
        <span id="level-badge" class="badge level-badge"></span>

        <h3 id="question-text" style="margin-top: 10px;"></h3>
        <div id="input-area"></div>

        <button id="check-btn" onclick="checkAnswer()">解答する</button>

        <div id="result-message" class="result-message"></div>
        <div id="explanation-area" class="explanation"></div>

        <button id="next-btn" onclick="nextQuestion()" style="display: none;">次の問題へ</button>

        <div style="margin-top: 30px; border-top: 1px solid #ddd; padding-top: 15px;">
            <button onclick="location.reload()" class="secondary-btn">ファイル選択に戻る</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>

</html>
